<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз: Подбор сценария ЭТРН</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .quiz-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .warning {
            background: #fff4e5;
            border: 1px solid #ffa940;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #8b5a00;
        }
        
        .warning::before {
            content: "⚠️";
            font-size: 20px;
        }
        
        .progress-bar {
            background: white;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .progress-fill {
            height: 8px;
            background: linear-gradient(90deg, #a78bfa 0%, #8b5cf6 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .step-indicator {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .card {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .card.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1e293b;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: 600;
        }
        
        /* ВСЕГДА в одну линию (даже при 4 карточках) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); /* 4 карточки теперь в ряд */
            gap: 20px;
            margin-bottom: 40px;
        }
        
        /* Все карточки одинакового размера */
        .option-card {
            background: #fafbfc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 32px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
            min-height: 220px;           /* фиксированная высота */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .option-card:hover {
            border-color: #a78bfa;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.15);
        }
        
        .option-card.selected {
            border-color: #8b5cf6;
            background: #f5f3ff;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
        }
        
        .option-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        
        .option-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .option-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }
        
        .option-description {
            font-size: 13px;
            color: #64748b;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .option-description span {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        button {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 140px;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        
        .btn-next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .btn-back {
            background: #e2e8f0;
            color: #475569;
        }
        
        .btn-back:hover {
            background: #cbd5e1;
        }
        
        .result {
            text-align: center;
        }
        
        .result-image {
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            margin: 30px 0;
        }
        
        .result-title {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 16px;
            font-weight: 700;
        }
        
        .result-subtitle {
            font-size: 20px;
            color: #8b5cf6;
            margin-bottom: 24px;
        }
        
        .result-description {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .result-link {
            display: inline-block;
            background: #f0f4ff;
            color: #3b82f6;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.2s;
        }
        
        .result-link:hover {
            background: #dbeafe;
            transform: translateY(-2px);
        }

        .btn-restart {
            background: #8b5cf6;
            color: white;
        }
        
        .btn-restart:hover {
            background: #7c3aed;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="warning">
            С сентября 2026 года ЭТрН станет обязательным
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        
        <div class="step-indicator" id="stepIndicator"></div>
        
        <div id="quizContent"></div>
    </div>

    <script>
        // ==================== ВОПРОСЫ ====================
        const questions = [
            {
                id: 1,
                title: "Кто инициирует и оформляет перевозку?",
                icon: "👤",
                options: [
                    { value: "sender", icon: "📤", label: "Владелец груза / продавец", details: ["Грузоотправитель сам"] },
                    { value: "expeditor", icon: "🤝", label: "Экспедитор (посредник)", details: ["Организует перевозку"] },
                    { value: "receiver", icon: "📥", label: "Покупатель / грузополучатель", details: ["Самовывоз"] },
                    { value: "third", icon: "🏪", label: "Склад или третья сторона", details: ["Ответственное хранение"] }
                ]
            },
            {
                id: 2,
                title: "Участвует ли экспедитор и принимает ли груз во владение?",
                icon: "🚚",
                options: [
                    { value: "no", icon: "❌", label: "Нет экспедитора", details: ["Перевозка без посредника"] },
                    { value: "organize", icon: "📋", label: "Только организует", details: ["Не принимает груз"] },
                    { value: "possess", icon: "🔑", label: "Принимает во владение", details: ["Становится временным владельцем"] }
                ]
            },
            {
                id: 3,
                title: "Какой у вас груз?",
                icon: "📦",
                options: [
                    { value: "ordinary", icon: "📦", label: "Обычный груз", details: ["Без особых условий"] },
                    { value: "sbor", icon: "🔀", label: "Сборный груз", details: ["Несколько отправителей/получателей"] },
                    { value: "temp", icon: "🌡️", label: "Скоропортящийся груз", details: ["Температура, санконтроль"] },
                    { value: "gis", icon: "🔍", label: "Груз с госучётом", details: ["Честный ЗНАК, Меркурий и др."] }
                ]
            },
            {
                id: 4,
                title: "Будет ли перегрузка груза?",
                icon: "🔄",
                options: [
                    { value: "no", icon: "➡️", label: "Нет, прямой путь", details: ["Без перевалки"] },
                    { value: "yes", icon: "🔁", label: "Да (кросс-докинг)", details: ["Перегрузка без хранения"] }
                ]
            },
            {
                id: 5,
                title: "Какой тип перевозки по сути?",
                icon: "🔗",
                options: [
                    { value: "sale", icon: "🛒", label: "Между разными компаниями", details: ["Продажа / поставка"] },
                    { value: "internal", icon: "🏬", label: "Внутренняя перевозка", details: ["Между своими складами"] },
                    { value: "self", icon: "🚗", label: "Самовывоз покупателем", details: ["Со склада продавца"] }
                ]
            },
            {
                id: 6,
                title: "Возможны ли изменения в процессе доставки?",
                icon: "⚠️",
                options: [
                    { value: "no", icon: "✅", label: "Нет, всё по плану", details: ["Без изменений"] },
                    { value: "replace", icon: "🚛", label: "Замена водителя / ТС", details: ["В процессе"] },
                    { value: "redirect", icon: "📍", label: "Переадресовка или отказ", details: ["Изменение получателя"] }
                ]
            }
        ];

        // ==================== ЛОГИКА СЦЕНАРИЕВ ====================
        const scenarioLogic = {
            1: { title: "Простая перевозка груза", description: "Грузоотправитель → Перевозчик → Грузополучатель. Последовательная подпись всех титулов (1-2-3-4).", num: 1 },
            2: { title: "Перевозка с участием одного экспедитора", description: "Экспедитор подписывает Титул 1 как отправитель (или с принятием груза во владение).", num: 2 },
            3: { title: "Перевозка сборного груза", description: "Экспедитор формирует сборный груз на складе. Возможны две ЭТРН или специальные отметки.", num: 3 },
            4: { title: "Перевозка с перегрузкой (кросс-докинг)", description: "Две ЭТРН: первая — до перегрузки, вторая — после.", num: 4 },
            5: { title: "Перевозка с заменой водителя или ТС", description: "После Титула 2 оформляется Титул 8 (замена водителя/транспортного средства).", num: 5 },
            6: { title: "Перевозка скоропортящегося груза", description: "В Титуле 1 указываются температурный режим и специальные условия.", num: 6 },
            7: { title: "Частичная приёмка и переадресация", description: "Титул 3 (частичная приёмка) + Титул 7 (переадресация новому получателю).", num: 7 },
            8: { title: "Отказ грузополучателя и переадресация", description: "Отказ в Титуле 3 + Титул 7 + возврат груза экспедитору.", num: 8 },
            9: { title: "Самовывоз покупателем", description: "Покупатель одновременно выступает и отправителем, и получателем.", num: 9 }
        };

        let currentQuestion = 0;
        let answers = {};

        function renderQuestion() {
            const question = questions[currentQuestion];
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('stepIndicator').textContent = `Шаг ${currentQuestion + 1} из ${questions.length}`;

            const selectedValue = answers[question.id];

            const contentDiv = document.getElementById('quizContent');
            contentDiv.innerHTML = `
                <div class="card active">
                    <div class="card-title">
                        ${question.icon} ${question.title}
                    </div>
                    <div class="options-grid">
                        ${question.options.map(opt => `
                            <div class="option-card ${selectedValue === opt.value ? 'selected' : ''}" 
                                 data-value="${opt.value}" 
                                 data-question="${question.id}">
                                <input type="radio" name="q${question.id}" value="${opt.value}" ${selectedValue === opt.value ? 'checked' : ''}>
                                <div class="option-icon">${opt.icon}</div>
                                <div class="option-title">${opt.label}</div>
                                <div class="option-description">
                                    ${opt.details.map(d => `<span>• ${d}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="buttons">
                        ${currentQuestion > 0 ? '<button class="btn-back" id="btnBack">← Назад</button>' : ''}
                        <button class="btn-next" id="btnNext" ${!selectedValue ? 'disabled' : ''}>
                            ${currentQuestion < questions.length - 1 ? 'Продолжить →' : 'Показать результат'}
                        </button>
                    </div>
                </div>
            `;

            const optionCards = contentDiv.querySelectorAll('.option-card');
            optionCards.forEach(card => {
                card.addEventListener('click', function () {
                    const qId = parseInt(this.dataset.question);
                    const val = this.dataset.value;
                    selectOption(qId, val);
                });
            });

            const btnNext = contentDiv.querySelector('#btnNext');
            if (btnNext) btnNext.addEventListener('click', nextQuestion);

            const btnBack = contentDiv.querySelector('#btnBack');
            if (btnBack) btnBack.addEventListener('click', prevQuestion);
        }

        function selectOption(questionId, value) {
            answers[questionId] = value;

            const selectedCards = document.querySelectorAll('.option-card');
            selectedCards.forEach(card => {
                if (parseInt(card.dataset.question) === questionId) {
                    if (card.dataset.value === value) {
                        card.classList.add('selected');
                        card.querySelector('input[type="radio"]').checked = true;
                    } else {
                        card.classList.remove('selected');
                        card.querySelector('input[type="radio"]').checked = false;
                    }
                }
            });

            const btnNext = document.getElementById('btnNext');
            if (btnNext) btnNext.disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function determineScenario() {
            const a1 = answers[1];
            const a2 = answers[2];
            const a3 = answers[3];
            const a4 = answers[4];
            const a5 = answers[5];
            const a6 = answers[6];

            if (a3 === "temp") return scenarioLogic[6];
            if (a6 === "replace") return scenarioLogic[5];
            if (a4 === "yes") return scenarioLogic[4];
            if (a3 === "sbor") return scenarioLogic[3];
            if (a5 === "self") return scenarioLogic[9];
            if (a6 === "redirect") return (a2 === "possess" || a1 === "expeditor") ? scenarioLogic[8] : scenarioLogic[7];
            if (a1 === "expeditor" || a2 === "possess" || a2 === "organize") return scenarioLogic[2];
            if (a1 === "receiver" || a5 === "self") return scenarioLogic[9];
            if (a1 === "sender" && a2 === "no" && a4 === "no" && a5 === "sale") return scenarioLogic[1];
            if (a5 === "internal") return scenarioLogic[1];

            return scenarioLogic[1];
        }

        function showResult() {
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('stepIndicator').textContent = 'Готово!';

            const scenario = determineScenario();
            
            const contentDiv = document.getElementById('quizContent');
            contentDiv.innerHTML = `
                <div class="card active">
                    <div class="result">
                        <div class="result-title">Ваш сценарий</div>
                        <div class="result-subtitle">№${scenario.num} — ${scenario.title}</div>
                        
                        <div class="result-description">
                            ${scenario.description}
                            <br><br>
                            Подробная инструкция по заполнению титулов ЭТРН именно для вашего случая — в статье Astral.ru.
                        </div>

                        <a href="https://astral.ru/aj/elem/kak-oformit-etrn-pri-raznykh-stsenariyakh-gruzoperevozki/" 
                           target="_blank" 
                           class="result-link">
                            📖 Открыть полную статью с примерами
                        </a>

                        <img src="Stsenariy_${scenario.num}.webp" 
                             alt="Сценарий ${scenario.num}" 
                             class="result-image"
                             onerror="this.src='https://placehold.co/800x400/8b5cf6/ffffff?text=Сценарий+№${scenario.num}'">

                        <button class="btn-restart" id="btnRestart">Пройти квиз заново</button>
                    </div>
                </div>
            `;

            document.getElementById('btnRestart').addEventListener('click', restart);
        }

        function restart() {
            currentQuestion = 0;
            answers = {};
            renderQuestion();
        }

        renderQuestion();
    </script>
</body>
</html>
